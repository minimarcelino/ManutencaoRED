<h1 mat-dialog-title>{{ data.title }}</h1>
<mat-dialog-content [innerHTML]="data.message"></mat-dialog-content>
<mat-dialog-actions>
  <button mat-button [mat-dialog-close]="data.buttonClose">{{ data.buttonClose }}</button>
  <button mat-button [mat-dialog-close]="data.buttonConfirm" cdkFocusInitial>{{ data.buttonConfirm }}</button>
</mat-dialog-actions>
