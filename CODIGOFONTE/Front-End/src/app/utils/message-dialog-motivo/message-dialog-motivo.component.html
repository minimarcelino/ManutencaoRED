<h2 mat-dialog-title>
  {{data.title}}
</h2>


<mat-dialog-content>


  <p>{{data.message}}</p>


  <mat-form-field appearance="outline" style="width:100%">

    <mat-label>Motivo</mat-label>

    <textarea
      matInput
      rows="5"
      [(ngModel)]="motivo">
    </textarea>


  </mat-form-field>


</mat-dialog-content>



<mat-dialog-actions align="end">


<button
mat-button
(click)="cancelar()">

Cancelar

</button>



<button
mat-raised-button
color="primary"
(click)="confirmar()"
[disabled]="!motivo">

Salvar

</button>


</mat-dialog-actions>
