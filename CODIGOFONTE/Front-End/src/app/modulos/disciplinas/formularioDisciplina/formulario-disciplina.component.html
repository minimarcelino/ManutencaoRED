<div class="corpo">

  <div class="title listagem">
    <h1>{{ this.titulo() }}</h1>
    <hr class="linha">
  </div>


  <div class="formulario">

    <form [formGroup]="formularioDisciplina" #formDir="ngForm">


      <!-- SIGLA -->
      <mat-form-field appearance="outline" class="campo">

        <mat-label>Sigla</mat-label>

        <input 
          matInput
          id="sigla"
          name="sigla"
          formControlName="sigla">


        <mat-error
          *ngIf="
          formularioDisciplina.get('sigla')?.errors &&
          (formularioDisciplina.get('sigla')?.dirty ||
          formularioDisciplina.get('sigla')?.touched)
          ">

          <span *ngIf="formularioDisciplina.get('sigla')?.errors?.['required']">
            Campo obrigatório! Só é aceito letras e espaços.
          </span>

        </mat-error>


      </mat-form-field>




      <!-- NOME -->
      <mat-form-field appearance="outline" class="campo">


        <mat-label>Nome</mat-label>


        <input
          matInput
          id="nome"
          name="nomeDisciplina"
          formControlName="nomeDisciplina">


        <mat-error
          *ngIf="
          formularioDisciplina.get('nomeDisciplina')?.errors &&
          (formularioDisciplina.get('nomeDisciplina')?.dirty ||
          formularioDisciplina.get('nomeDisciplina')?.touched)
          ">


          <span *ngIf="formularioDisciplina.get('nomeDisciplina')?.errors?.['required']">

            Campo obrigatório! Só é aceito letras e espaços.

          </span>


        </mat-error>


      </mat-form-field>





      <!-- CURSO -->
      <mat-form-field appearance="outline" class="campo">


        <mat-label>Curso</mat-label>


        <input

          formControlName="Curso"
          id="curso"
          type="text"
          placeholder="Selecione um curso"
          matInput
          [matAutocomplete]="auto">


        <mat-autocomplete
          [displayWith]="displayFn"
          #auto="matAutocomplete">


          <mat-option
            *ngFor="let c of filteredCursos | async"
            [value]="c">


            {{c.nomeCurso}}


          </mat-option>


        </mat-autocomplete>



        <mat-error
          *ngIf="
          formularioDisciplina.get('Curso')?.errors &&
          (formularioDisciplina.get('Curso')?.dirty ||
          formularioDisciplina.get('Curso')?.touched)
          ">


          <span *ngIf="formularioDisciplina.get('Curso')?.errors?.['required']">

            Campo obrigatório!

          </span>


          <span *ngIf="formularioDisciplina.get('Curso')?.errors?.['cursoInvalido']">

            Curso inválido. Selecione um curso da lista.

          </span>


        </mat-error>


      </mat-form-field>





      <!-- BOTÕES -->
      <div class="botoes">


        <button

          mat-raised-button
          color="warn"
          type="button"
          class="button"

          (click)="retornarParaLista()">


          Voltar


        </button>



        <button

          *ngIf="!this.desabilitado"

          mat-raised-button
          color="primary"
          type="button"
          class="button" 

          (click)="submit()">



          {{ this.editando ? 'Salvar' : 'Cadastrar'}}



        </button>


      </div>



    </form>


  </div>


</div>
