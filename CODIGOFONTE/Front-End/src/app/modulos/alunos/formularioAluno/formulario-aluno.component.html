<div class="corpo">

  <div class="title listagem">
    <h1>{{ titulo() }}</h1>
    <hr class="linha" />
  </div>

  <div class="formulario">
    <form [formGroup]="formularioAluno">

      <!-- PRONTUÁRIO -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Prontuário</mat-label>
        <input matInput formControlName="prontuario" placeholder="Ex: PE123456A" mask="AA000000A" />

        <mat-error *ngIf="formularioAluno.get('prontuario')?.errors 
          && (formularioAluno.get('prontuario')?.dirty || formularioAluno.get('prontuario')?.touched)">
          <span *ngIf="formularioAluno.get('prontuario')?.errors?.['required']">
            Campo obrigatório
          </span>
        </mat-error>
      </mat-form-field>

      <!-- NOME -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nome</mat-label>
        <input matInput formControlName="nome" placeholder="Digite o nome completo" />

        <mat-error *ngIf="formularioAluno.get('nome')?.errors 
          && (formularioAluno.get('nome')?.dirty || formularioAluno.get('nome')?.touched)">
          <span *ngIf="formularioAluno.get('nome')?.errors?.['required']">
            Campo obrigatório
          </span>
        </mat-error>
      </mat-form-field>

      <!-- DATA -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Data de Nascimento</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="data" placeholder="Selecione a data">

        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>

        <mat-error *ngIf="formularioAluno.get('data')?.errors 
          && (formularioAluno.get('data')?.dirty || formularioAluno.get('data')?.touched)">
          <span *ngIf="formularioAluno.get('data')?.errors?.['required']">
            Campo obrigatório
          </span>
        </mat-error>
      </mat-form-field>

      <!-- TELEFONE -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Telefone</mat-label>
        <input matInput formControlName="telefone" placeholder="(18) 99999-9999"
          [specialCharacters]="['(', ')', '-']" mask="(00)00000-0000" />

        <mat-error *ngIf="formularioAluno.get('telefone')?.errors 
          && (formularioAluno.get('telefone')?.dirty || formularioAluno.get('telefone')?.touched)">
          <span *ngIf="formularioAluno.get('telefone')?.errors?.['required']">
            Campo obrigatório
          </span>
        </mat-error>
      </mat-form-field>

      <!-- EMAIL -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" placeholder="exemplo@email.com" />

        <mat-error *ngIf="formularioAluno.get('email')?.errors 
          && (formularioAluno.get('email')?.dirty || formularioAluno.get('email')?.touched)">
          <span *ngIf="formularioAluno.get('email')?.errors?.['required']">
            Campo obrigatório
          </span>
          <span *ngIf="formularioAluno.get('email')?.errors?.['email']">
            Formato inválido para e-mail
          </span>
        </mat-error>
      </mat-form-field>

      <!-- CURSO -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Curso</mat-label>
        <input matInput formControlName="curso" placeholder="Digite ou selecione um curso"
          [matAutocomplete]="auto">

        <mat-autocomplete #auto="matAutocomplete" [displayWith]="displayFn">
          <mat-option *ngFor="let c of filteredCursos | async" [value]="c">
            {{ c.nomeCurso }}
          </mat-option>
        </mat-autocomplete>

        <mat-error *ngIf="formularioAluno.get('curso')?.errors 
          && (formularioAluno.get('curso')?.dirty || formularioAluno.get('curso')?.touched)">
          <span *ngIf="formularioAluno.get('curso')?.errors?.['required']">
            Campo obrigatório
          </span>
          <span *ngIf="formularioAluno.get('curso')?.errors?.['cursoInvalido']">
            Curso inválido. Selecione da lista.
          </span>
        </mat-error>
      </mat-form-field>

      <!-- BOTÃO CADASTRAR CURSO (linha de cima) -->
      <div class="acoes-curso">
        <button mat-raised-button class="btn-secundario" type="button" (click)="CadastrarCurso()">
          <mat-icon>add</mat-icon>
          Cadastrar Curso
        </button>
      </div>

      <!-- BOTÕES PRINCIPAIS (linha de baixo) -->
      <div *ngIf="!desabilitado" class="acoes-principais">
        <button mat-raised-button class="btn-cancelar" type="button" (click)="retornarParaLista()">
          Cancelar
        </button>

        <button mat-raised-button class="btn-cadastrar" type="button" (click)="submit()">
          {{ editando ? 'Salvar' : 'Cadastrar' }}
        </button>
      </div>

    </form>
  </div>
</div>
