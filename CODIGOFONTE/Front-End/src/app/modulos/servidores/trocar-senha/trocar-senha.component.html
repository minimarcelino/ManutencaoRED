<div class="body" translate="no">
  <div class="container">

    <form (ngSubmit)="confirmarSenha()" [formGroup]="senhaForm">

      <div class="header">
        <h1>Sistema RED</h1>
        <hr class="linha" />
      </div>

      <div class="fields">

        <!-- SENHA -->
        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>

          <input matInput [type]="hide ? 'password' : 'text'" formControlName="senha" />

          <button mat-icon-button matSuffix type="button" (click)="hide = !hide">
            <mat-icon>{{ hide ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>

          <mat-error *ngIf="senha.errors?.['required']">
            A senha é obrigatória!
          </mat-error>
        </mat-form-field>

        <!-- CONFIRMAR SENHA -->
        <mat-form-field appearance="outline">
          <mat-label>Confirme a Senha</mat-label>

          <input matInput [type]="hide2 ? 'password' : 'text'" formControlName="confirmeSenha" />

          <button mat-icon-button matSuffix type="button" (click)="hide2 = !hide2">
            <mat-icon>{{ hide2 ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>

          <mat-error *ngIf="confirmeSenha.errors?.['required']">
            A confirmação é obrigatória!
          </mat-error>

          <mat-error *ngIf="senha.value !== confirmeSenha.value && confirmeSenha.touched">
            As senhas não coincidem!
          </mat-error>
        </mat-form-field>

        <!-- BOTÕES -->
        <mat-dialog-actions align="end">
          <button mat-button class="btn-cancelar" (click)="cancelar()">
            Cancelar
          </button>

          <button mat-raised-button color="primary" (click)="confirmarSenha()">
            Alterar senha
          </button>
        </mat-dialog-actions>

      </div>
    </form>
  </div>
</div>
