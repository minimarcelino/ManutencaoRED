<div class="corpo">

  <!-- TÍTULO -->
  <div class="title listagem">
    <h1>Associação de Disciplina</h1>
    <h2>{{ apresentarAluno() }}</h2>
    <hr class="linha" />
  </div>

  <!-- FILTRO -->
  <div class="filtro">
    <mat-form-field appearance="outline" style="width: 100%;">
      <mat-label>Filtrar disciplinas</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Digite para buscar..." />
    </mat-form-field>
  </div>

  <!-- TABELA DE DISCIPLINAS DISPONÍVEIS -->
  <h3>Disciplinas disponíveis</h3>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!-- Sigla -->
    <ng-container matColumnDef="Sigla">
      <th mat-header-cell *matHeaderCellDef> Sigla </th>
      <td mat-cell *matCellDef="let element"> {{ element.sigla }} </td>
    </ng-container>

    <!-- Nome -->
    <ng-container matColumnDef="NomeDisciplina">
      <th mat-header-cell *matHeaderCellDef> Nome </th>
      <td mat-cell *matCellDef="let element"> {{ element.nomedisciplina }} </td>
    </ng-container>

    <!-- Ações -->
    <ng-container matColumnDef="Acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let element">

        <button mat-raised-button color="primary"
          (click)="selecionarDisciplina(element)">
          Associar
        </button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <!-- PAGINATOR 1 -->
  <mat-paginator
        [pageSize]="10"
        [pageSizeOptions]="[10, 25, 50]"
        showFirstLastButtons
      >
      </mat-paginator>

  <br />

  <!-- TABELA DE DISCIPLINAS ASSOCIADAS -->
  <h3>Disciplinas associadas</h3>

  <table mat-table [dataSource]="dataSource2" class="mat-elevation-z8">

    <!-- Sigla -->
    <ng-container matColumnDef="Sigla">
      <th mat-header-cell *matHeaderCellDef> Sigla </th>
      <td mat-cell *matCellDef="let element"> {{ element.sigla }} </td>
    </ng-container>

    <!-- Nome -->
    <ng-container matColumnDef="NomeDisciplina">
      <th mat-header-cell *matHeaderCellDef> Nome </th>
      <td mat-cell *matCellDef="let element"> {{ element.nomedisciplina }} </td>
    </ng-container>

    <!-- Ações -->
    <ng-container matColumnDef="Acoes">
      <th mat-header-cell *matHeaderCellDef> Ações </th>
      <td mat-cell *matCellDef="let element">

        <button mat-raised-button color="warn"
          (click)="removerDisciplina(element)">
          Desassociar
        </button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <!-- PAGINATOR 2 -->
  <mat-paginator
        [pageSize]="10"
        [pageSizeOptions]="[10, 25, 50]"
        showFirstLastButtons
      >
      </mat-paginator>

  <br />

  <!-- BOTÕES -->
  <div class="acoes" style="display: flex; justify-content: flex-end; gap: 10px;">

    <!--
    <button mat-raised-button color="primary" (click)="cadastrar()">
      Confirmar
    </button>
    -->

    <button mat-raised-button color="warn" (click)="cancelar()">
      Fechar
    </button>

  </div>

</div>
