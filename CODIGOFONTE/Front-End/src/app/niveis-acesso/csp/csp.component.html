<div class="container">
  <mat-toolbar class="mat-elevation-z8">
    <button mat-icon-button (click)="sidenav.toggle()">
      <mat-icon *ngIf="!sidenav.opened">menu</mat-icon>
      <mat-icon *ngIf="sidenav.opened">close</mat-icon>
    </button>
    Menu
    <span class="spacer"></span>
    Olá, {{authenticationService.userLogged?.nome}} !
  </mat-toolbar>

  <mat-sidenav-container>
    <mat-sidenav #sidenav="matSidenav" mode="side" opened="true">

      <button mat-button routerLink="/manual">

        <mat-icon>menu_book</mat-icon>

        <span>Manual do Sistema</span>

      </button>

      <button mat-button class="menu-button" routerLink="/csp/home">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </button>

      <button mat-button class="menu-button" routerLink="/csp/perfil">
        <mat-icon>account_circle</mat-icon>
        <span>Perfil</span>
      </button>

      <button mat-button class="menu-button" routerLink="/csp/listarREDs">
        <mat-icon>local_library</mat-icon>
        <span>Processos REDs</span>
      </button>

      <button mat-button class="menu-button" routerLink="/csp/listarCursos">
        <mat-icon>school</mat-icon>
        <span>Cursos</span>
      </button>

      <button mat-button class="menu-button" routerLink="/csp/listarDisciplinas">
        <mat-icon>class</mat-icon>
        <span>Disciplinas</span>
      </button>

      <button mat-button class="menu-button" routerLink="/csp/listarServidores">
        <mat-icon>perm_identity</mat-icon>
        <span>Docentes</span>
      </button>

      <button mat-button class="menu-button" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Sair</span>
      </button>

    </mat-sidenav>
    <mat-sidenav-content>
      <div class="content mat-elevation-z8">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
