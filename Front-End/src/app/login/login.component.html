<div class="body">
    <div class="container">
        <form (ngSubmit)="fazerLogin()" [formGroup]="loginForm" #formDir="ngForm">
            <div style="padding: 15px 0px 15px 0px;text-align: center;">
                <h1> Login </h1>
                <hr class="linha" />
            </div>
            <div class="fields">
                <mat-form-field appearance="fill">
                    <mat-label>Email</mat-label>
                    <input matInput name="email" formControlName="email" required/>
                    <div *ngIf="email.invalid && formDir.submitted" class="validation">
                        <p>O Email é obrigatório!</p>
                    </div>
                </mat-form-field>
                <mat-form-field appearance="fill">
                    <mat-label>Senha</mat-label>
                    <input matInput [type]="hide ? 'password' : 'text'" name="senha" formControlName="senha"/>
                    <div *ngIf="senha.invalid && formDir.submitted" class="validation">
                        <p *ngIf="senha.errors?.['required']">A senha é obrigatório!</p>
                    </div>
                </mat-form-field>
            </div>
             <button mat-flat-button color="primary">Entrar</button>
        </form>
    </div>
</div>
