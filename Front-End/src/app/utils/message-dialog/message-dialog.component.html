<h1 mat-dialog-title [style.font-weight]="'bold'">{{data.title}}</h1>
<div mat-dialog-content>
  {{data.message}}
</div>
<div mat-dialog-actions>
  <button mat-button mat-dialog-close [mat-dialog-close]="'Cancelar'">{{data.buttonClose}}</button>
  <button mat-button mat-dialog-close cdkFocusInitial [mat-dialog-close]="'Confirmar'">{{data.buttonConfirm}}</button>
</div>
