<div class="container">
    <div>
        <h1>Cadastar Curso</h1>
        <hr>
    </div>
    <div class="fields">
        <form [formGroup]="cadastrarCurso" #formDir="ngForm">
            <mat-form-field appearance="fill" style="width: 20%; margin-right: 10px;">
                <mat-label>Sigla</mat-label>
                <input matInput name="sigla" formControlName="sigla"/>
                <div *ngIf="cadastrarCurso.get('sigla')?.invalid && formDir.submitted" class="validation">
                    <p>Sigla obrigatória</p>
                </div>
            </mat-form-field>
            <mat-form-field appearance="fill" style="width: 78.5%;">
                <mat-label>Nome do Curso</mat-label>
                <input matInput name="nomeCurso" formControlName="nomeCurso"/>
                <div *ngIf="cadastrarCurso.get('nomeCurso')?.invalid && formDir.submitted" class="validation">
                    <p>Curso obrigatório!</p>
                </div>
            </mat-form-field>
            <mat-form-field>
                <input formControlName="Coordenador" type="text" placeholder="Selecione um coordenador" aria-label="Professor Coordenador" matInput [matAutocomplete]="auto">
                <mat-autocomplete [displayWith]="displayFn" #auto="matAutocomplete">
                    <mat-option *ngFor="let c of coordenadores" [value]="c">
                        {{c.nome}}
                    </mat-option>
                </mat-autocomplete>
            </mat-form-field>
            <div *ngIf="cadastrarCurso.get('idcordenador')?.invalid && formDir.submitted" class="validation">
                <p>Coordenador obrigatório!</p>
            </div>
            <button mat-raised-button color="primary" (click)="voltar()">Voltar</button>
            <button mat-raised-button color="primary" (click)="submit()" style="margin-left: 4px;">Cadastrar</button>
        </form>
    </div>
</div>
