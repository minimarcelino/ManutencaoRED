<div class="title">
    <h1>Cursos</h1>
    <hr class="linha" />
</div>

<div class="listagem">
    <div id="tabela">
        <mat-form-field>
          <mat-label>Pesquisar Curso</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Bacharelado">
        </mat-form-field> 
        <table appearance="outline" mat-table [dataSource]="dataSource" class="mat-elevation-z8">

            <!-- NomeColumn -->
            <ng-container matColumnDef="nomeCurso">
                <th mat-header-cell *matHeaderCellDef> Curso </th>
                <td mat-cell *matCellDef="let c"> {{c.nomeCurso}} </td>
            </ng-container>
          
            <!-- SiglaColumn -->
            <ng-container matColumnDef="sigla">
                <th mat-header-cell *matHeaderCellDef> Sigla </th>
                <td mat-cell *matCellDef="let c"> {{c.sigla}} </td>
            </ng-container>
          
            <!-- Outras colunas aqui, se necessário -->
            <ng-container matColumnDef="acoes">
              <th class="actionsColumns" mat-header-cell *matHeaderCellDef> Ações </th>
              <td class="actionsColumns" mat-cell *matCellDef="let c">
                <button mat-icon-button matTooltip="Editar curso" (click)="editarCurso(c)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button matTooltip="Deletar curso" (click)="deleteCurso(c)">
                  <mat-icon>delete</mat-icon>
                </button>
                <div class="file-input-container">
                  <span>Importar disciplinas</span>
                  <label class="file-input-label">
                    <input type="file" (change)="onFileChange($event, c)" />
                    <mat-icon>attach_file</mat-icon>
                  </label>
                </div>
              </td>
            </ng-container>            

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table> 
    </div>
    <button mat-raised-button color="primary" (click)="cadastrar()" id="cadastrar">Cadastrar Curso</button>
</div>
