<div class="title" translate="no">
    <h1>Processos REDs</h1>
    <hr class="linha" />
</div>

<div class="listagem" translate="no">
    <div id="tabela">

        <table appearance="outline" mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort>

            <!-- NomeColumn -->
            <ng-container matColumnDef="nomeAluno">
                <th mat-header-cell *matHeaderCellDef> Aluno </th>
                <td mat-cell *matCellDef="let red"> {{ red.aluno.nome }} </td>
            </ng-container>

            <!-- NomeColumn -->
            <ng-container matColumnDef="inicioRed">
                <th mat-header-cell *matHeaderCellDef> Início RED </th>
                <td mat-cell *matCellDef="let red"> {{ formatData(red.dataInicioProcesso) }} </td>
            </ng-container>

            <!-- DataColumn -->
            <ng-container matColumnDef="terminoRed">
                <th mat-header-cell *matHeaderCellDef> Término RED </th>
                <td mat-cell *matCellDef="let red"> {{ formatData(red.dataPrevisaoTermino) }} </td>
            </ng-container>

            <!-- EnderecoColumn -->
            <ng-container matColumnDef="prazoPee">
                <th mat-header-cell *matHeaderCellDef> Prazo PEE </th>
                <td mat-cell *matCellDef="let red"> {{ formatData(red.inicioAfastamento) }} </td>
            </ng-container>

            <!-- TelefoneColumn -->
            <ng-container matColumnDef="Situação">
                <th mat-header-cell *matHeaderCellDef> Situação </th>
                <td mat-cell *matCellDef="let red"> {{ red.situacao }} </td>
            </ng-container>

            <ng-container matColumnDef="concluido">
                <th mat-header-cell *matHeaderCellDef> Associação de disciplinas </th>
                <td mat-cell *matCellDef="let a">
                  <ng-container *ngIf="!a.pee || a.pee.length === 0">
                    Não Concluído
                  </ng-container>
                  <ng-container *ngIf="a.pee && a.pee.length > 0">
                    Concluído
                  </ng-container>
                </td>
              </ng-container>

            <!-- Outras colunas aqui, se necessário -->
            <ng-container matColumnDef="acoes">
                <th class="actionsColumns" mat-header-cell *matHeaderCellDef> Ações </th>
                  <td class="actionsColumns" mat-cell *matCellDef="let a">
                    <button *ngIf="a.situacao === 'Em andamento' && a.pee.length === 0" mat-icon-button matTooltip="Associar disciplinas" (click)="associarDisciplina(a)">
                        <mat-icon>book</mat-icon>
                    </button>
                    <button mat-icon-button matTooltip="Visualizar RED" (click)="visualizarRed(a)">
                        <mat-icon>visibility</mat-icon>
                      </button>
                      <button *ngIf="a.situacao === 'Finalizado'" mat-icon-button matTooltip="Gerar relatório de faltas" (click)="gerarRelatorioFaltasAbonadas(a)">
                        <mat-icon>description</mat-icon>
                      </button>
                  </td>
            </ng-container> 
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        <button mat-raised-button color="primary" (click)="cadastrarRed()" id="cadastrarRed" style="margin-top: 10px; margin-left: 10px;" *ngIf="mostrarBotao">Cadastrar RED</button>
    </div>
</div>
