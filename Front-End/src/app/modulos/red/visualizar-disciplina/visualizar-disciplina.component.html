<div class="container" translate="no">
    <div class="title" translate="no">
        <h1>Disciplinas</h1>
        <hr class="linha" />
    </div>
    <form [formGroup]="visualizarDisciplina" #formDir="ngForm">
        <div id="tabela">             
            <table appearance="outline" mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort>

                <ng-container matColumnDef="professor">
                    <th mat-header-cell *matHeaderCellDef> Professor </th>
                    <td mat-cell *matCellDef="let a"> {{a.servidor.nome}} </td>
                </ng-container>
            
                <ng-container matColumnDef="sigla">
                    <th mat-header-cell *matHeaderCellDef> Sigla </th>
                    <td mat-cell *matCellDef="let a"> {{a.disciplinas.sigla}} </td>
                </ng-container>
                           
                <ng-container matColumnDef="nomedisciplina">
                    <th mat-header-cell *matHeaderCellDef> Nome </th>
                    <td mat-cell *matCellDef="let a"> {{a.disciplinas.nomeDisciplina}} </td>
                </ng-container>
                
                <ng-container matColumnDef="situacao">
                    <th mat-header-cell *matHeaderCellDef> Situação </th>
                    <td mat-cell *matCellDef="let a; let i = index"> 
                      {{a.situacao}} 
                      <button mat-raised-button color="primary" *ngIf="verificarSituacao()[i]"  id="cadastrar">Enviar Email</button>
                    </td>
                  </ng-container>
                  

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table> 
            <mat-paginator [pageSizeOptions]="[5, 10]" aria-label="Select page of users"></mat-paginator>
        </div>
        <button mat-raised-button color="primary" (click)="cancelar()" id="cadastrar" style="margin-top: 10px;">Fechar</button>
    </form>
</div>
