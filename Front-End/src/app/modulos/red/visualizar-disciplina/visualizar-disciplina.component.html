<div class="corpo">
  <div class="title listagem">
    <h1>Disciplinas</h1>
    <hr class="linha" />
  </div>

  <div class="formulario">
    <form [formGroup]="visualizarDisciplina" #formDir="ngForm">

      <div id="tabela">
        <table appearance="outline" mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort>

          <ng-container matColumnDef="Professor">
            <th mat-header-cell *matHeaderCellDef> Professor </th>
            <td mat-cell *matCellDef="let a"> {{ this.apresentarDocentes(a)}} </td>
          </ng-container>

          <ng-container matColumnDef="Sigla">
            <th mat-header-cell *matHeaderCellDef> Sigla </th>
            <td mat-cell *matCellDef="let a"> {{a.disciplinas.sigla}} </td>
          </ng-container>

          <ng-container matColumnDef="NomeDisciplina">
            <th mat-header-cell *matHeaderCellDef> Nome </th>
            <td mat-cell *matCellDef="let a"> {{a.disciplinas.nomeDisciplina}} </td>
          </ng-container>

          <ng-container matColumnDef="Situacao">
            <th mat-header-cell *matHeaderCellDef> Situação </th>
            <td mat-cell *matCellDef="let a">
              {{a.situacao}}
            </td>
          </ng-container>


          <ng-container matColumnDef="Acoes">
            <th mat-header-cell *matHeaderCellDef> Ações </th>
            <td mat-cell *matCellDef="let a">

              <button mat-raised-button matTooltip="Associar Professor" class="button" color="primary"
                (click)="associarProfessor(a)" *ngIf="this.peeAguardandoProfessor(a)">
                <mat-icon>person_add_alt</mat-icon>
                Associar Professor
              </button>

              <button mat-raised-button color="primary" class="button" *ngIf="verificarSituacao(a)"
                (click)="sendEmailProfessor(a)" id="cadastrar">Enviar Email
              </button>

            </td>
          </ng-container>


          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        <mat-paginator [pageSizeOptions]="[5, 10]"></mat-paginator>
      </div>
      <button mat-raised-button color="warn" (click)="cancelar()" id="cadastrar" class="button"
        >Fechar</button>
    </form>
  </div>
</div>
