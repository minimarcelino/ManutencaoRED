<div class="corpo">

  <div class="title listagem" *ngIf="mostrarCampo; else notADM">
    <h1>Cadastro de Servidores</h1>
    <hr class="linha" />
  </div>

  <ng-template #notADM>
    <div class="title listagem">
      <h1>Cadastro de Docentes</h1>
      <hr class="linha" />
    </div>
  </ng-template>

  <div class="formulario">
    <form [formGroup]="cadastrarServidor" #formDir="ngForm">

      <!-- PRONTUÁRIO -->
      <mat-form-field appearance="fill" class="lado-esquerdo">
        <mat-label>Prontuário</mat-label>
        <input matInput name="prontuario" id="prontuario" formControlName="prontuario" mask="AA00000A" />
        <mat-error
          *ngIf="cadastrarServidor.get('prontuario')?.errors && (cadastrarServidor.get('prontuario')?.dirty || cadastrarServidor.get('prontuario')?.touched)">
          <span *ngIf="cadastrarServidor.get('prontuario')?.errors?.['required']">Prontuário obrigatório</span>
        </mat-error>
      </mat-form-field>

      <!-- NOME -->
      <mat-form-field appearance="fill" class="lado-direito">
        <mat-label>Nome</mat-label>
        <input matInput name="nome" id="nome" formControlName="nome" />
        <mat-error
          *ngIf="cadastrarServidor.get('nome')?.errors && (cadastrarServidor.get('nome')?.dirty || cadastrarServidor.get('nome')?.touched)">
          <span *ngIf="cadastrarServidor.get('nome')?.errors?.['required']">Nome obrigatório</span>
        </mat-error>
      </mat-form-field>

      <!-- EMAIL -->
      <mat-form-field appearance="fill">
        <mat-label>Email</mat-label>
        <input matInput name="email" id="email" formControlName="email" />
        <mat-error
          *ngIf="cadastrarServidor.get('email')?.errors && (cadastrarServidor.get('email')?.dirty || cadastrarServidor.get('email')?.touched)">
          <span *ngIf="cadastrarServidor.get('email')?.errors?.['required']">E-mail obrigatório</span>
          <span *ngIf="cadastrarServidor.get('email')?.errors?.['email']">Formato inválido para e-mail</span>
        </mat-error>
      </mat-form-field>

      <!-- TIPO DE SERVIDOR -->
      <div *ngIf="mostrarCampo()">
        <mat-form-field>
          <mat-label>Categoria de Servidor</mat-label>
          <input matInput name="tiposervidor" id="tiposervidor" formControlName="tiposervidor" [matAutocomplete]="auto">
          <mat-autocomplete #auto="matAutocomplete">
            <mat-option *ngFor="let c of tipoServidores" [value]="c">
              {{c}}
            </mat-option>
          </mat-autocomplete>
          <mat-error
            *ngIf="cadastrarServidor.get('tiposervidor')?.errors && (cadastrarServidor.get('tiposervidor')?.dirty || cadastrarServidor.get('tiposervidor')?.touched)">
            <span *ngIf="cadastrarServidor.get('tiposervidor')?.errors?.['required']">Tipo do servidor
              obrigatório</span>
          </mat-error>
        </mat-form-field>
      </div>

      <div id="buttons">
        <button mat-raised-button color="primary" class="button" (click)="voltar()">Voltar</button>
        <button mat-raised-button color="primary" class="button" (click)="submit()">Cadastrar</button>
      </div>
    </form>
  </div>
</div>
