<div class="container">

  <div class="title" *ngIf="mostrarCampo; else notADM">
    <h1>Servidores</h1>
  </div>

  <ng-template #notADM>
    <div class="title">
      <h1>Docentes</h1>
    </div>
  </ng-template>

    <div class="fields">
        <form [formGroup]="cadastrarServidor" #formDir="ngForm">
          <!-- PRONTUÁRIO -->
            <mat-form-field appearance="fill" style="margin-right: 10px; min-width: 10%; max-width: 100%;">
                <mat-label>Prontuário</mat-label>
                <input matInput name="prontuario" formControlName="prontuario" mask="AA000000A"/>
                <div *ngIf="cadastrarServidor.get('prontuario')?.invalid && formDir.submitted" class="validation">
                    <p>Prontuario obrigatório!</p>
                </div>
            </mat-form-field>

            <!-- NOME -->
            <mat-form-field appearance="fill" style="min-width: 25%; max-width: 100%; margin-right: 600px;">
                <mat-label>Nome</mat-label>
                <input matInput name="nome" formControlName="nome"/>
                <div *ngIf="cadastrarServidor.get('nome')?.invalid && formDir.submitted" class="validation">
                    <p>Nome obrigatório!</p>
                </div>
            </mat-form-field>

            <!-- EMAIL -->
            <mat-form-field appearance="fill" style="min-width: 40%; max-width: 100%; margin-right: 10px;">
                <mat-label>Email</mat-label>
                <input matInput name="email" formControlName="email"/>
                <div *ngIf="cadastrarServidor.get('email')?.invalid && formDir.submitted" class="validation">
                    <p>Email obrigatório!</p>
                </div>
            </mat-form-field>

            <!-- TIPO DE SERVIDOR -->
            <div *ngIf="mostrarCampo()">
            <mat-form-field style="min-width: 40%; max-width: 100%; margin-right: 10px;" >
              <mat-label>Categoria de Servidor</mat-label>
              <input matInput name="tiposervidor" formControlName="tiposervidor" [matAutocomplete]="auto">
              <mat-autocomplete #auto="matAutocomplete">
                <mat-option *ngFor="let c of tipoServidores" [value]="c">
                  {{c}}
                </mat-option>
              </mat-autocomplete>
              <div *ngIf="cadastrarServidor.get('tiposervidor')?.invalid && formDir.submitted" class="validation">
                <p>Categoria do Servidor obrigatório!</p>
              </div>
            </mat-form-field>
            </div>
            <div id="buttons">
                <button mat-raised-button color="primary" (click)="voltar()">Voltar</button>
                <button mat-raised-button color="primary" (click)="submit()" style="margin-left: 4px;">Cadastrar</button>
            </div>
        </form>
    </div>
</div>
