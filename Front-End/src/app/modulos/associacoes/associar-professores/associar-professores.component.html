<div class="container" translate="no">
  <div class="title">
    <h1>Associação de professores</h1>
    <h2>{{ this.apresentarDisciplina() }}</h2>
    <hr class="linha" />
  </div>

  <div>
    <form [formGroup]="associarProfessor" #formDir="ngForm">

      <mat-form-field>
        <mat-label>Pesquisar Professor</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. André Luis | PE0000000 | andre.l@ifsp.edu.br">
      </mat-form-field>

      <div class="header-container">
        <hr class="linha" />
        <h3 class="centralized-header">Professores disponíveis</h3>
        <div id="tabela"></div>

        <table appearance="outline" mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort>

          <ng-container matColumnDef="Nome">
            <th mat-header-cell *matHeaderCellDef> Nome </th>
            <td mat-cell *matCellDef="let a"> {{a.nome}} </td>
          </ng-container>

          <ng-container matColumnDef="Email">
            <th mat-header-cell *matHeaderCellDef> Email </th>
            <td mat-cell *matCellDef="let a"> {{a.email}} </td>
          </ng-container>

          <ng-container matColumnDef="Acoes">
            <th class="actionsColumns" mat-header-cell *matHeaderCellDef> Ações </th>
            <td class="actionsColumns" mat-cell *matCellDef="let a">
              <button mat-raised-button color="primary" (click)="selecionarProfessor(a)" id="cadastrar">
                <mat-icon>playlist_add</mat-icon>
                Associar
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        <mat-paginator [pageSizeOptions]="[10, 25]" showFirstLastButtons></mat-paginator>
      </div>

      <div class="header-container">
        <hr class="linha" />
        <h3 class="centralized-header">Professores selecionados</h3>
        <div id="tabela">
          <table appearance="outline" mat-table [dataSource]="dataSource2" class="mat-elevation-z8" matSort>

            <ng-container matColumnDef="Nome">
              <th mat-header-cell *matHeaderCellDef> Nome </th>
              <td mat-cell *matCellDef="let a"> {{a.nome}} </td>
            </ng-container>

            <ng-container matColumnDef="Email">
              <th mat-header-cell *matHeaderCellDef> Email </th>
              <td mat-cell *matCellDef="let a"> {{a.email}} </td>
            </ng-container>

            <ng-container matColumnDef="Acoes">
              <th class="actionsColumns" mat-header-cell *matHeaderCellDef> Ações </th>
              <td class="actionsColumns" mat-cell *matCellDef="let a">
                <button mat-raised-button color="primary" (click)="removerProfessor(a)" id="remover">
                  <mat-icon>playlist_remove</mat-icon>
                  Remover
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
          <mat-paginator [pageSizeOptions]="[10, 25]" showFirstLastButtons></mat-paginator>
        </div>
      </div>

      <div>
        <button mat-raised-button color="primary" (click)="cadastrar()" id="cadastrar" class="button">Associar
          Professores selecionados</button>
        <button mat-raised-button color="warn" (click)="cancelar()" id="cadastrar" class="button">Cancelar</button>
      </div>
    </form>
  </div>
</div>
