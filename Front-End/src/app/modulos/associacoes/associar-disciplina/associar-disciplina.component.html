<div class="container" translate="no">

  <div class="title" translate="no">
    <h1>Associação de Disciplina</h1>
    <h2>{{ this.apresentarAluno() }}</h2>
    <hr class="linha" />
  </div>

  <div>
    <form [formGroup]="associarDisciplina" #formDir="ngForm">

      <mat-form-field>
        <mat-label>Pesquisar Disciplina</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Banco de Dados">
      </mat-form-field>

      <div class="header-container">
        <hr class="linha" />
        <h3 class="centralized-header">Disciplinas disponíveis</h3>

        <div id="tabela">
          <table appearance="outline" mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort>

            <ng-container matColumnDef="sigla">
              <th mat-header-cell *matHeaderCellDef> Sigla </th>
              <td mat-cell *matCellDef="let a"> {{a.sigla}} </td>
            </ng-container>

            <ng-container matColumnDef="nomedisciplina">
              <th mat-header-cell *matHeaderCellDef> Nome </th>
              <td mat-cell *matCellDef="let a"> {{a.nomeDisciplina}} </td>
            </ng-container>

            <ng-container matColumnDef="acoes">
              <th class="actionsColumns" mat-header-cell *matHeaderCellDef> Ações </th>
              <td class="actionsColumns" mat-cell *matCellDef="let a">
                <button mat-raised-button color="primary" (click)="selecionarDisciplina(a)"
                  id="cadastrar">Associar</button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

          </table>
          <mat-paginator [pageSizeOptions]="[5, 10]" aria-label="Select page of users"></mat-paginator>
        </div>
      </div>


      <div class="header-container">
        <hr class="linha" />
        <h3 class="centralized-header">Disciplinas selecionadas</h3>

        <div id="tabela">
          <table appearance="outline" mat-table [dataSource]="dataSource2" class="mat-elevation-z8" matSort>

            <thead>
              <tr>
                <th colspan="3" style="text-align: center;">Cabeçalho Centralizado</th>
              </tr>
            </thead>

            <ng-container matColumnDef="sigla">
              <th mat-header-cell *matHeaderCellDef> Sigla </th>
              <td mat-cell *matCellDef="let a"> {{a.sigla}} </td>
            </ng-container>

            <ng-container matColumnDef="nomedisciplina">
              <th mat-header-cell *matHeaderCellDef> Nome </th>
              <td mat-cell *matCellDef="let a"> {{a.nomeDisciplina}} </td>
            </ng-container>

            <ng-container matColumnDef="acoes">
              <th class="actionsColumns" mat-header-cell *matHeaderCellDef> Ações </th>
              <td class="actionsColumns" mat-cell *matCellDef="let a">
                <button mat-raised-button color="primary" (click)="removerDisciplina(a)" id="remover">Remover</button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
          <mat-paginator [pageSizeOptions]="[5, 10]" aria-label="Select page of users"></mat-paginator>
        </div>
      </div>

      <button mat-raised-button color="primary" (click)="cancelar()" id="cadastrar" class="button">Cancelar</button>
      <button mat-raised-button color="primary" (click)="cadastrar()" id="cadastrar" class="button">
        Associar Disciplinas Selecionadas
      </button>
    </form>
  </div>
