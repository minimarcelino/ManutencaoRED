<div class="container" translate="no">
    <div>
        <h1>Visualizar Aluno</h1>
        <hr>
    </div>
    <div class="fields">
        <form [formGroup]="visualizarAluno" #formDir="ngForm">
            <mat-form-field appearance="fill" style="margin-right: 1%; min-width: 20%; max-width: 100%; margin-left: 1%">
                <mat-label>Prontuário</mat-label>
                <input matInput name="prontuario" formControlName="prontuario" mask="AA0000000"/>
            </mat-form-field>
            <mat-form-field appearance="fill" style="min-width: 50%; max-width: 100%; ">
                <mat-label>Nome</mat-label>
                <input matInput name="nome" formControlName="nome"/>
            </mat-form-field>
            <mat-form-field style="min-width: 35%; max-width: 100%; margin-right: 1%; margin-left: 1%">
                <mat-label>Data de Nascimento</mat-label>
                <input matInput [matDatepicker]="picker" formControlName="dataNascimento">
                <mat-hint>DD/MM/YYYY</mat-hint>
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
              </mat-form-field>              
            <mat-form-field appearance="fill" style="min-width: 35%; max-width: 100%;">
                <mat-label>Telefone</mat-label>
                <input matInput name="telefone" formControlName="telefone" [specialCharacters]="['(', ')', '-']" 
                mask="(00)00000-0000"/>
            </mat-form-field>
            <mat-form-field appearance="fill" style="min-width: 71%; max-width: 100%; margin-left: 1%">
                <mat-label>Email</mat-label>
                <input matInput name="email" formControlName="email"/>
            </mat-form-field>
            <mat-form-field appearance="fill" style="min-width: 71%; max-width: 100%; margin-left: 1% ">
                <mat-label>Curso</mat-label>
                <input matInput name="curso" formControlName="curso"/>
            </mat-form-field>         
            <div id="buttons">
                <button mat-raised-button color="primary" (click)="cancelar()" style="margin-left: 4px;">Fechar</button>
            </div>
        </form>
    </div>
</div>
