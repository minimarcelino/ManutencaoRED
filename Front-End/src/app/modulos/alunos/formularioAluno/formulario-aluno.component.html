<div class="corpo">

  <div class="title listagem">
    <h1>{{ this.titulo() }}</h1>
    <hr class="linha" />
  </div>

  <div class="formulario">
    <form [formGroup]="cadastrarAluno" #formDir="ngForm">

      <mat-form-field appearance="fill" class="lado-esquerdo">
        <mat-label>Prontuário</mat-label>
        <input matInput id="prontuario" name="prontuario" formControlName="prontuario" mask="AA000000A" />
        <mat-error
          *ngIf="cadastrarAluno.get('prontuario')?.errors && (cadastrarAluno.get('prontuario')?.dirty || cadastrarAluno.get('prontuario')?.touched)">
          <span *ngIf="cadastrarAluno.get('prontuario')?.errors?.['required']">Campo obrigatório</span>
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" class="lado-direito">
        <mat-label>Nome</mat-label>
        <input matInput id="nome" name="nome" formControlName="nome" />
        <mat-error
          *ngIf="cadastrarAluno.get('nome')?.errors && (cadastrarAluno.get('nome')?.dirty || cadastrarAluno.get('nome')?.touched)">
          <span *ngIf="cadastrarAluno.get('nome')?.errors?.['required']">Campo obrigatório</span>
        </mat-error>
      </mat-form-field>

      <mat-form-field class="lado-esquerdo">
        <mat-label>Data de Nascimento</mat-label>
        <input matInput [matDatepicker]="picker" id="data" formControlName="data">
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
        <mat-error
          *ngIf="cadastrarAluno.get('data')?.errors && (cadastrarAluno.get('data')?.dirty || cadastrarAluno.get('data')?.touched)">
          <span *ngIf="cadastrarAluno.get('data')?.errors?.['required']">Campo obrigatório</span>
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" class="lado-direito">
        <mat-label>Telefone</mat-label>
        <input matInput name="telefone" id="telefone" formControlName="telefone" [specialCharacters]="['(', ')', '-']"
          mask="(00)00000-0000" />
        <mat-error
          *ngIf="cadastrarAluno.get('telefone')?.errors && (cadastrarAluno.get('telefone')?.dirty || cadastrarAluno.get('telefone')?.touched)">
          <span *ngIf="cadastrarAluno.get('telefone')?.errors?.['required']">Campo obrigatório</span>
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Email</mat-label>
        <input matInput name="email" id="email" formControlName="email" />
        <mat-error
          *ngIf="cadastrarAluno.get('email')?.errors && (cadastrarAluno.get('email')?.dirty || cadastrarAluno.get('email')?.touched)">
          <span *ngIf="cadastrarAluno.get('email')?.errors?.['required']">Campo obrigatório</span>
          <span *ngIf="cadastrarAluno.get('email')?.errors?.['email']">Formato inválido para e-mail</span>
        </mat-error>
      </mat-form-field>

      <mat-form-field>
        <input formControlName="curso" id="curso" type="text" placeholder="Selecione um Curso" matInput
          [matAutocomplete]="auto">
        <mat-autocomplete [displayWith]="displayFn" #auto="matAutocomplete">
          <mat-option *ngFor="let c of cursos" [value]="c">
            {{c.nomeCurso}}
          </mat-option>
        </mat-autocomplete>
        <mat-error
          *ngIf="cadastrarAluno.get('curso')?.errors && (cadastrarAluno.get('curso')?.dirty || cadastrarAluno.get('curso')?.touched)">
          <span *ngIf="cadastrarAluno.get('curso')?.errors?.['required']">Campo obrigatório</span>
        </mat-error>
      </mat-form-field>


      <div *ngIf="!this.desabilitado">

        <button mat-raised-button color="warn" class="button" (click)="retornarParaLista()">Cancelar</button>
        <button mat-raised-button color="primary" class="button" (click)="submit()">
          {{ this.editando ? 'Editar' : 'Cadastrar'}}
        </button>
      </div>

      <div *ngIf="this.desabilitado">
        
        <button mat-raised-button color="primary" class="button" (click)="retornarParaLista()">Voltar</button>
      </div>
    </form>
  </div>
</div>
