<div class="container" translate="no">
  <div>
    <h1>Editar Aluno</h1>
    <hr>
  </div>
  <div class="fields">
    <form [formGroup]="editarAluno" #formDir="ngForm">

      <mat-form-field appearance="fill" style="margin-right: 1%; min-width: 20%; max-width: 100%; margin-left: 1%;">
        <mat-label>Prontuário</mat-label>
        <input matInput name="prontuario" formControlName="prontuario" mask="AA000000A" />
        <mat-error
          *ngIf="editarAluno.get('prontuario')?.errors && (editarAluno.get('prontuario')?.dirty || editarAluno.get('prontuario')?.touched)">
          <span *ngIf="editarAluno.get('prontuario')?.errors?.['required']">Campo obrigatório</span>
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" style="min-width: 50%; max-width: 100%;">
        <mat-label>Nome</mat-label>
        <input matInput name="nome" formControlName="nome" value="" />
        <mat-error
          *ngIf="editarAluno.get('nome')?.errors && (editarAluno.get('nome')?.dirty || editarAluno.get('nome')?.touched)">
          <span *ngIf="editarAluno.get('nome')?.errors?.['required']">Campo obrigatório</span>
        </mat-error>
      </mat-form-field>

      <mat-form-field style="min-width: 35%; max-width: 100%; margin-right: 1%; margin-right: 1%;">
        <mat-label>Data de Nascimento</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="data">
        <mat-hint>DD/MM/YYYY</mat-hint>
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
        <mat-error
          *ngIf="editarAluno.get('data')?.errors && (editarAluno.get('data')?.dirty || editarAluno.get('data')?.touched)">
          <span *ngIf="editarAluno.get('data')?.errors?.['required']">Campo obrigatório</span>
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" style="min-width: 35%; max-width: 100%;">
        <mat-label>Telefone</mat-label>
        <input matInput name="telefone" formControlName="telefone" [specialCharacters]="['(', ')', '-']"
          mask="(00)00000-0000" />
        <mat-error
          *ngIf="editarAluno.get('telefone')?.errors && (editarAluno.get('telefone')?.dirty || editarAluno.get('telefone')?.touched)">
          <span *ngIf="editarAluno.get('telefone')?.errors?.['required']">Campo obrigatório</span>
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" style="min-width: 71%; max-width: 100%; margin-right: 1%;">
        <mat-label>Email</mat-label>
        <input matInput name="email" formControlName="email" />
        <mat-error
          *ngIf="editarAluno.get('email')?.errors && (editarAluno.get('email')?.dirty || editarAluno.get('email')?.touched)">
          <span *ngIf="editarAluno.get('email')?.errors?.['required']">Campo obrigatório</span>
          <span *ngIf="editarAluno.get('email')?.errors?.['email']">Formato inválido para email</span>
        </mat-error>
      </mat-form-field>

      <mat-form-field style="min-width: 71%; max-width: 100%; margin-right: 1%;">
        <input formControlName="curso" type="text" placeholder="Selecione um Curso" matInput [matAutocomplete]="auto">
        <mat-autocomplete [displayWith]="displayFn" #auto="matAutocomplete">
          <mat-option *ngFor="let c of cursos" [value]="c">
            {{c.nomeCurso}}
          </mat-option>
        </mat-autocomplete>
        <mat-error
          *ngIf="editarAluno.get('curso')?.errors && (editarAluno.get('curso')?.dirty || editarAluno.get('curso')?.touched)">
          <span *ngIf="editarAluno.get('curso')?.errors?.['required']">Campo obrigatório</span>
        </mat-error>
      </mat-form-field>

      <div id="buttons">
        <button mat-raised-button color="primary" (click)="cancelar()" style="margin-left: 4px;">Cancelar</button>
        <button mat-raised-button color="primary" (click)="submit()" style="margin-left: 4px;">Confirmar</button>
      </div>
    </form>
  </div>
</div>
