<div class="container">
    <div>
        <h1>Cadastar Disciplinas</h1>
        <hr>
    </div>
    <div class="fields">
        <form [formGroup]="cadastrarDisciplina" #formDir="ngForm">
            <mat-form-field appearance="fill" style="margin-right: 10px; min-width: 10%; max-width: 100%;">
                <mat-label>Prontuário</mat-label>
                <input matInput name="sigla" formControlName="sigla"/>
                <div *ngIf="cadastrarDisciplina.get('sigla')?.invalid && formDir.submitted" class="validation">
                    <p>Sigla obrigatória!</p>
                </div>
            </mat-form-field>
            <mat-form-field appearance="fill" style="min-width: 25%; max-width: 100%; margin-right: 600px;">
                <mat-label>Nome</mat-label>
                <input matInput name="nomedisciplina" formControlName="nomedisciplina"/>
                <div *ngIf="cadastrarDisciplina.get('nomedisciplina')?.invalid && formDir.submitted" class="validation">
                    <p>Nome da disciplina obrigatório!</p>
                </div>
            </mat-form-field>
            <mat-form-field appearance="fill" style="min-width: 40%; max-width: 100%; margin-right: 10px;">
                <mat-label>Curso</mat-label>
                <input matInput name="curso_idcurso" formControlName="curso_idcurso"/>
                <div *ngIf="cadastrarDisciplina.get('curso_idcurso')?.invalid && formDir.submitted" class="validation">
                    <p>ID do curso obrigatório!</p>
                </div>
            </mat-form-field>
            <div id="buttons">
                <button mat-raised-button color="primary" (click)="voltar()">Voltar</button>
                <button mat-raised-button color="primary" (click)="submit()" style="margin-left: 4px;">Cadastrar</button>
            </div>
        </form>
    </div>
</div>
