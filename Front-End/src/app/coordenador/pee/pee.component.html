<div class="title">
    <h1>PEEs dos Alunos</h1>
    <hr class="linha" />
  </div>
  
  <div class="listagem">
    <div id="tabela">
  
     <!-- <mat-form-field>
        <mat-label> Filtrar por cursos</mat-label>
        <mat-select (selectionChange)="filterByCurso($event)">
          <mat-option *ngFor="let a of reds" [value]="a.aluno.curso.sigla">
            {{a.aluno.curso.sigla}}
          </mat-option>
        </mat-select>
      </mat-form-field> -->
      <table appearence="outline" mat-table [dataSource]="dataSource" class="mat-elevation-z8">
        <!-- Prontuario Column -->
       
        <ng-container matColumnDef="prazofinal">
            <th mat-header-cell *matHeaderCellDef> Prazo Final </th>
            <td mat-cell *matCellDef="let a"> {{formatData(a.prazofinal)}} </td>
          </ng-container>
  
        <ng-container matColumnDef="dataEnvioProposta">
          <th mat-header-cell *matHeaderCellDef> Envio Proposta </th>
          <td mat-cell *matCellDef="let a"> {{formatData(a.dataEnvioProposta)}} </td>
        </ng-container>
  
        
        <ng-container matColumnDef="dataAvaliacao">
          <th mat-header-cell *matHeaderCellDef> Avaliacao </th>
          <td mat-cell *matCellDef="let a"> {{formatData(a.dataAvaliacao)}} </td>
        </ng-container>
  
  
        
        
  
  
        <!-- Outras colunas aqui, se necessário -->
        <ng-container matColumnDef="Ações">
          <th class="actionsColumns" mat-header-cell *matHeaderCellDef> Ações </th>
          <td class="actionsColumns" mat-cell *matCellDef="let a">
            <button mat-icon-button matTooltip="Associar professor" (click)="associarProfessor(a)">
              <mat-icon>book</mat-icon>
            </button>
          </td>
        </ng-container>
  
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      <mat-paginator [pageSizeOptions]="[5, 10]" aria-label="Select page of users"></mat-paginator>
    </div>
  </div>
