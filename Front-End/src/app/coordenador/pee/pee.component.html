<div class="title">
  <h1>PEEs dos Professores</h1>
  <hr class="linha" />
</div>

<div class="listagem">
  <div id="tabela">

    <!-- <mat-form-field>
        <mat-label> Filtrar por cursos</mat-label>
        <mat-select (selectionChange)="filterByCurso($event)">
          <mat-option *ngFor="let a of reds" [value]="a.aluno.curso.sigla">
            {{a.aluno.curso.sigla}}
          </mat-option>
        </mat-select>
      </mat-form-field> -->
    <table appearence="outline" mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <!-- Prontuario Column -->
      <ng-container matColumnDef="professor">
        <th mat-header-cell *matHeaderCellDef> Professor </th>
        <td mat-cell *matCellDef="let a"> {{a.servidor.nome}} </td>
      </ng-container>

      <ng-container matColumnDef="aluno">
        <th mat-header-cell *matHeaderCellDef> Aluno </th>
        <td mat-cell *matCellDef="let a"> {{a.red.aluno.nome}} </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let a"> {{a.red.aluno.email}} </td>
      </ng-container>

      <ng-container matColumnDef="disciplina">
        <th mat-header-cell *matHeaderCellDef> Disciplina </th>
        <td mat-cell *matCellDef="let a"> {{a.disciplinas.nomeDisciplina}} </td>
      </ng-container>  

      <ng-container matColumnDef="concluido">
        <th mat-header-cell *matHeaderCellDef> Conclusão </th>
        <td mat-cell *matCellDef="let a">
          <ng-container *ngIf="!a.conteudo || a.conteudo.trim().length === 0">
            Não Concluído
          </ng-container>
          <ng-container *ngIf="a.conteudo && a.conteudo.trim().length > 0">
            Concluído
          </ng-container>
        </td>
      </ng-container>
      
      <ng-container matColumnDef="Ações">
        <th class="actionsColumns" mat-header-cell *matHeaderCellDef> Ações </th>
        <td class="actionsColumns" mat-cell *matCellDef="let a">
          <button mat-icon-button matTooltip="Visualizar PEE" (click)="visualizarPEE(a)">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button matTooltip="Associar professor" (click)="associarProfessor(a)">
            <mat-icon>book</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10]" aria-label="Select page of users"></mat-paginator>
  </div>
</div>
