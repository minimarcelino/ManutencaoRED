<div class="title">
    <h1>Processos</h1>
    <hr class="linha" />
</div>

<div class="listagem">
    <div id="tabela">

        <table appearance="outline" mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort>

            <!-- ProntuarioColumn -->
            <ng-container matColumnDef="prontuario">
                <th mat-header-cell *matHeaderCellDef> Prontuário </th>
                <td mat-cell *matCellDef="let red"> {{red.aluno_prontuario}} </td>
            </ng-container>

            <!-- NomeColumn -->
            <ng-container matColumnDef="Início RED">
                <th mat-header-cell *matHeaderCellDef> Início RED </th>
                <td mat-cell *matCellDef="let red"> {{red.dataInicioRed}} </td>
            </ng-container>

            <!-- DataColumn -->
            <ng-container matColumnDef="Término RED">
                <th mat-header-cell *matHeaderCellDef> Término RED </th>
                <td mat-cell *matCellDef="let red"> {{ red.dataPrevisaoTermino}} </td>
            </ng-container>

            <!-- EnderecoColumn -->
            <ng-container matColumnDef="Prazo PEE">
                <th mat-header-cell *matHeaderCellDef> Prazo PEE </th>
                <td mat-cell *matCellDef="let red"> {{red.dataLimitePee}} </td>
            </ng-container>

            <!-- TelefoneColumn -->
            <ng-container matColumnDef="Situação">
                <th mat-header-cell *matHeaderCellDef> Situação </th>
                <td mat-cell *matCellDef="let red"> {{red.situacao}} </td>
            </ng-container>


            <!-- Outras colunas aqui, se necessário 
            <ng-container matColumnDef="acoes">
                <th class="actionsColumns" mat-header-cell *matHeaderCellDef> Ações </th>
                  <td class="actionsColumns" mat-cell *matCellDef="let a">
                    <button mat-icon-button (click)="editarAluno(a)">
                      <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button (click)="deleteAluno(a)">
                      <mat-icon>delete</mat-icon>
                    </button>
                  </td>
            </ng-container> 
-->
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>
    <button mat-raised-button color="primary" (click)="cadastrarRed()" id="cadastrarRED">Cadastrar RED</button>
</div>
