<div class="title">
    <h1>Processos</h1>
    <hr class="linha" />
</div>

<div class="listagem">
    <div id="tabela">

        <table appearence="outline" mat-table [dataSource]="dataSource" class="mat-elevation-z8">
            <!-- Prontuario Column -->
            <ng-container matColumnDef="ID">
                <th mat-header-cell *matHeaderCellDef> ID </th>
                <td mat-cell *matCellDef="let a"> {{a.idRED}} </td>
            </ng-container>

            <!-- Início RED Column -->
            <ng-container matColumnDef="Início RED">
                <th mat-header-cell *matHeaderCellDef> Início RED </th>
                <td mat-cell *matCellDef="let a"> {{formatData(a.inicioAfastamento)}} </td>
            </ng-container>

            <!-- Tempo Afastamento Column -->
            <ng-container matColumnDef="Tempo Afastamento">
                <th mat-header-cell *matHeaderCellDef> Tempo Afastamento </th>
                <td mat-cell *matCellDef="let a"> {{a.tempoAfastamento}} dias</td>
            </ng-container>

            <!-- Previsão Término Column -->
            <ng-container matColumnDef="Previsão Término">
                <th mat-header-cell *matHeaderCellDef> Previsão Término </th>
                <td mat-cell *matCellDef="let a"> {{formatData(a.dataPrevisaoTermino)}} </td>
            </ng-container>

            <!-- Situação Column -->
            <ng-container matColumnDef="Situação">
                <th mat-header-cell *matHeaderCellDef> Situação </th>
                <td mat-cell *matCellDef="let a"> {{a.situacao}} </td>
            </ng-container>

            <!-- Ações Column -->
            <ng-container matColumnDef="Ações">
                <th mat-header-cell *matHeaderCellDef> Ações </th>
                <td mat-cell *matCellDef="let a">
                    <!-- Adicione botões de ação aqui -->
                </td>
            </ng-container>


            <!-- Outras colunas aqui, se necessário 
            <ng-container matColumnDef="acoes">
                <th class="actionsColumns" mat-header-cell *matHeaderCellDef> Ações </th>
                  <td class="actionsColumns" mat-cell *matCellDef="let a">
                    <button mat-icon-button (click)="editarAluno(a)">
                      <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button (click)="deleteAluno(a)">
                      <mat-icon>delete</mat-icon>
                    </button>
                  </td>
            </ng-container> 
-->
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>
    <button mat-raised-button color="primary" (click)="cadastrarRed()" id="cadastrarRED">Cadastrar RED</button>
</div>
